name: Autopublicar Artigo Turbina IA

on:
  schedule:
    # Executa DIARIAMENTE 3 vezes ao dia:
    # - 06:00 Horário de Brasília (09:00 UTC)
    # - 12:00 Horário de Brasília (15:00 UTC)
    # - 18:00 Horário de Brasília (21:00 UTC)
    # Esses são os melhores horários de pico comercial no Brasil para tráfego e SEO.
    - cron: '0 9,15,21 * * *'
  workflow_dispatch:
    # Permite disparar manualmente pelo painel do GitHub Actions

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar Dependências
        run: npm ci || npm install

      - name: Executar Atualizações por IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node scripts/update-models.js
          node scripts/generate-article.js

      - name: Commitar e Enviar Artigo e Modelos Atualizados
        run: |
          git config --global user.name "Turbina IA Bot"
          git config --global user.email "bot@turbinaia.com.br"
          
          # Verifica se há alterações (artigos ou dados dos modelos de IA)
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: atualizações automáticas de artigos e modelos de IA [skip ci]"
            git push
            echo "✅ Alterações publicadas com sucesso!"
          else
            echo "⚠️ Nenhuma alteração detectada."
          fi
