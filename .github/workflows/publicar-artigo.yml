name: Autopublicar Artigo Turbina IA

on:
  schedule:
    # 3 artigos por dia, em horários de pico no Brasil (UTC):
    # - 09:00 UTC = 06:00 BRT  → roda também as atualizações das páginas
    # - 16:00 UTC = 13:00 BRT  → só artigo
    # - 23:00 UTC = 20:00 BRT  → só artigo
    - cron: '0 9 * * *'
    - cron: '0 16 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:
    # Disparo manual pelo painel do GitHub Actions (usado para validação)
    inputs:
      run_updates:
        description: 'Também rodar as atualizações das páginas (models, calculadora, etc.)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar Dependências
        run: npm ci || npm install

      - name: Instalar Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Verificar Claude CLI
        run: claude --version || echo "⚠️ claude CLI indisponível — os scripts cairão no fallback do Gemini"

      - name: Diagnóstico Claude (cru vs sanitizado)
        continue-on-error: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          echo "tamanho do token recebido: ${#CLAUDE_CODE_OAUTH_TOKEN} (se > do que o token real, há espaços/quebras)"
          echo "### 1) token CRU direto no CLI (deve falhar com 'invalid value' se houver espaço/quebra):"
          printf 'Responda apenas: OK' | claude -p --output-format json --model sonnet 2>&1 | head -5 || true
          echo "### 2) via wrapper llm.js, que sanitiza o token (deve funcionar):"
          node -e "require('./scripts/llm').models.generateContent({model:'x',contents:'Responda apenas com: OK'}).then(r=>console.log('✅ CLAUDE OK:', JSON.stringify(r.text).slice(0,120))).catch(e=>console.log('❌', e.message))"

      # As atualizações das 6 páginas só rodam 1x/dia (no primeiro horário) para
      # economizar consumo do plano. No disparo manual, marque "run_updates".
      - name: Atualizar páginas (models, calculadora, changelog, ferramentas, prompts, glossário)
        if: github.event.schedule == '0 9 * * *' || (github.event_name == 'workflow_dispatch' && inputs.run_updates)
        continue-on-error: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node scripts/update-models.js     || echo "⚠️ update-models falhou"
          node scripts/update-calculator.js || echo "⚠️ update-calculator falhou"
          node scripts/update-changelog.js  || echo "⚠️ update-changelog falhou"
          node scripts/update-tools.js      || echo "⚠️ update-tools falhou"
          node scripts/update-prompts.js    || echo "⚠️ update-prompts falhou"
          node scripts/update-glossario.js  || echo "⚠️ update-glossario falhou"

      - name: Gerar Artigo
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node scripts/generate-article.js

      - name: Commitar e Enviar Alterações
        run: |
          git config --global user.name "Turbina IA Bot"
          git config --global user.email "jppnovais@gmail.com"

          # Verifica se há alterações (artigos novos ou dados das páginas atualizados)
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: atualizações automáticas de artigos e páginas [skip ci]"
            git push
            echo "✅ Alterações publicadas com sucesso!"
          else
            echo "⚠️ Nenhuma alteração detectada."
          fi
