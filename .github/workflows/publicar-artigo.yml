name: Autopublicar Artigo Turbina IA

on:
  schedule:
    # Executa toda segunda e quinta-feira às 09:00 UTC (06:00 Horário de Brasília)
    #
    # DICA: Para alterar a frequência de execução, edite a expressão cron abaixo.
    # Exemplos de expressões cron:
    # - Rodar DIARIAMENTE às 06h00 (Brasília): '0 9 * * *'
    # - Rodar SEMANALMENTE aos Domingos às 06h00 (Brasília): '0 9 * * 0'
    # - Rodar A CADA 12 HORAS: '0 */12 * * *'
    # - Rodar A CADA HORA: '0 * * * *'
    #
    - cron: '0 9 * * 1,4'
  workflow_dispatch:
    # Permite disparar manualmente pelo painel do GitHub Actions

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar Dependências
        run: npm ci || npm install

      - name: Executar Gerador de Artigos por IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-article.js

      - name: Commitar e Enviar novo Artigo
        run: |
          git config --global user.name "Turbina IA Bot"
          git config --global user.email "bot@turbinaia.com.br"
          
          # Verifica se há alterações na pasta de artigos
          if [ -n "$(git status --porcelain content/articles)" ]; then
            git add content/articles/
            git commit -m "chore: novo artigo gerado automaticamente por IA [skip ci]"
            git push
            echo "✅ Novo artigo publicado com sucesso!"
          else
            echo "⚠️ Nenhum novo artigo foi gerado ou alterado."
          fi
