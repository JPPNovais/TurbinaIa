name: Autopublicar Artigo Turbina IA

on:
  schedule:
    # Cadência reduzida para ~3 artigos por SEMANA (seg/qua/sex), evitando o
    # padrão de "fazenda de conteúdo" que o Google AdSense penaliza em sites
    # novos. Qualidade e ritmo humano > volume.
    # - 16:00 UTC = 13:00 BRT, às segundas, quartas e sextas.
    - cron: '0 16 * * 1,3,5'
  workflow_dispatch:
    # Disparo manual pelo painel do GitHub Actions (usado para validação)
    inputs:
      run_updates:
        description: 'Também rodar as atualizações das páginas (models, calculadora, etc.)'
        type: boolean
        default: false
      article_type:
        description: 'Tipo de pauta (rodizio = automático pelo dia: seg=notícia, qua=ferramenta, sex=uso prático)'
        type: choice
        options:
          - rodizio
          - noticia
          - ferramenta
          - uso
        default: rodizio

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar Dependências
        run: npm ci || npm install

      - name: Instalar Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Verificar Claude CLI
        run: claude --version || echo "⚠️ claude CLI indisponível — os scripts cairão no fallback do Gemini"

      # As atualizações das 6 páginas rodam 1x/dia (no primeiro horário) e usam o
      # Gemini — são tarefas de pesquisar dados + reescrever arquivo, rápidas e
      # baratas no Gemini e mal-adequadas ao Claude headless (agêntico/lento).
      # No disparo manual, marque "run_updates".
      - name: Atualizar páginas (models, calculadora, changelog, ferramentas, prompts, glossário)
        if: github.event.schedule == '0 16 * * 1,3,5' || (github.event_name == 'workflow_dispatch' && inputs.run_updates)
        continue-on-error: true
        env:
          LLM_SKIP_CLAUDE: '1'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node scripts/update-models.js     || echo "⚠️ update-models falhou"
          node scripts/update-calculator.js || echo "⚠️ update-calculator falhou"
          node scripts/update-changelog.js  || echo "⚠️ update-changelog falhou"
          node scripts/update-tools.js      || echo "⚠️ update-tools falhou"
          node scripts/update-prompts.js    || echo "⚠️ update-prompts falhou"
          node scripts/update-glossario.js  || echo "⚠️ update-glossario falhou"

      - name: Gerar Artigo
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          # Rodízio de pauta: seg=notícia, qua=ferramenta, sex=uso prático.
          # No disparo manual, article_type força um tipo específico.
          ARTICLE_TYPE: ${{ inputs.article_type }}
        run: node scripts/generate-article.js

      - name: Commitar e Enviar Alterações
        run: |
          git config --global user.name "Turbina IA Bot"
          git config --global user.email "jppnovais@gmail.com"

          # Verifica se há alterações (artigos novos ou dados das páginas atualizados)
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: atualizações automáticas de artigos e páginas [skip ci]"
            git push
            echo "✅ Alterações publicadas com sucesso!"
          else
            echo "⚠️ Nenhuma alteração detectada."
          fi
